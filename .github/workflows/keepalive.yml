name: Keep Supabase Alive
on:
  schedule:
    # Alle 5 Tage um 04:00 UTC. Free Supabase pausiert nach 7 Tagen Inaktivität.
    - cron: '0 4 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Pivot-Signal Health-Endpoint
        run: |
          echo "Pinge https://pivot-signal.com/.netlify/functions/health"
          response=$(curl -s -w "\n%{http_code}" --max-time 30 \
            "https://pivot-signal.com/.netlify/functions/health" || echo "000")
          body=$(echo "$response" | head -n1)
          status=$(echo "$response" | tail -n1)
          echo "Status: $status"
          echo "Body: $body"
          if [ "$status" != "200" ]; then
            echo "::error::Health-Check fehlgeschlagen (HTTP $status)"
            exit 1
          fi
          echo "OK Supabase wach"
