# Netlify configuration for Pivot-Signal

[build]
  publish = "."

# Redirect /en/ to root (default language)
[[redirects]]
  from = "/"
  to = "/en/"
  status = 302

# Pretty URLs
[[redirects]]
  from = "/all-eas"
  to = "/en/all-eas.html"
  status = 301

[[redirects]]
  from = "/custom-ea"
  to = "/en/custom-ea.html"
  status = 301

[[redirects]]
  from = "/expert-advisor"
  to = "/en/expert-advisor.html"
  status = 301

[[redirects]]
  from = "/about"
  to = "/en/about.html"
  status = 301

# Security & Performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/imgs/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
